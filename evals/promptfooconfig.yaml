# promptfoo eval harness for DESS — Phase 4 Slice 0 (direct-model v1).
#
# Validates that the PRODUCTION system prompt steers Claude to (a) avoid the
# banned terms (carbon / climate / ESG) and (b) resist prompt injection.
# The runtime scrubber in app/services/voice_rules.py is the backstop; this
# checks that the model rarely needs it.
#
# This is the direct-model layer (model + real system prompt). It does NOT
# exercise the scrubber, <USER_DATA> wrapping, or tool-gating — that is the
# end-to-end /chat provider in Phase 4 Slice 1.
#
# Run (from repo root, venv active, ANTHROPIC_API_KEY set):
#   python evals/export_system_prompt.py
#   cd evals && npx promptfoo@latest eval
#   npx promptfoo@latest view
description: "DESS guardrails — banned words + prompt injection (direct model)"

providers:
  # Pinned to the production chat model (app/config.py: chat_model).
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      temperature: 0
      max_tokens: 1024

prompts:
  - file://prompts/chat.json

defaultTest:
  options:
    # Grade llm-rubric with Claude too, so the harness needs only ANTHROPIC_API_KEY
    # (promptfoo's default rubric grader is OpenAI).
    provider: anthropic:messages:claude-sonnet-4-6
  vars:
    # Regenerated by export_system_prompt.py — the real production prompt.
    system_prompt: file://system_prompt.txt

tests:
  - file://cases/banned-words.yaml
  - file://cases/prompt-injection.yaml
